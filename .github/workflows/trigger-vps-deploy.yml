name: Trigger VPS deploy

# Auto: staging branch only. Production VPS is promoted manually from bidmart-infrastructure.

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    branches: [staging]
    types: [completed]
  workflow_dispatch:
    inputs:
      target:
        description: 'Which VPS environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod

concurrency:
  group: bidmart-wallet-trigger-vps-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: github.repository == 'advprog-2026-A17-project/bidmart-wallet-service-rust' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Resolve target
        id: resolve
        env:
          INPUT_TARGET: ${{ github.event.inputs.target }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${INPUT_TARGET:-staging}"
            branch="${{ github.ref_name }}"
          else
            target=staging
            branch="${WORKFLOW_RUN_BRANCH:-staging}"
          fi
          if [ "$target" = "prod" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "::error::Production VPS deploy is manual. Run Deploy production VPS in bidmart-infrastructure with confirm_promotion=promote."
            exit 1
          fi
          if [ "$target" != "prod" ] && [ "$target" != "staging" ]; then
            target=staging
          fi
          if [ "$target" = "prod" ]; then
            branch=main
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "Triggering VPS deploy: $target (branch=$branch)"

      - name: Trigger infrastructure VPS deploy
        if: steps.resolve.outputs.target == 'staging'
        env:
          GH_TOKEN: ${{ secrets.VPS_DEPLOY_DISPATCH_TOKEN }}
          EVENT_TYPE: deploy-vps-staging
          DEPLOY_BRANCH: ${{ steps.resolve.outputs.branch }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::VPS_DEPLOY_DISPATCH_TOKEN is not configured."
            exit 1
          fi
          gh api repos/advprog-2026-A17-project/bidmart-infrastructure/dispatches \
            -f event_type="$EVENT_TYPE" \
            -f "client_payload[branch]=$DEPLOY_BRANCH"

      - name: Point to manual production promotion
        if: steps.resolve.outputs.target == 'prod'
        run: |
          echo "Production VPS is not dispatched from service repos."
          echo "Run workflow 'Deploy production VPS' in bidmart-infrastructure:"
          echo "  confirm_promotion=promote, branch=main"
